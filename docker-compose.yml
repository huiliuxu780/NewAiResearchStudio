version: '3.8'

services:
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_USE_MOCK=false
      - NEXT_PUBLIC_API_KEY=${API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-research-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    restart: unless-stopped

  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/research.db
      - APP_ENV=${APP_ENV:-production}
      - API_KEY=${API_KEY:-dev-key-change-in-production}
      - CORS_ORIGINS=["http://localhost:3000"]
    volumes:
      - backend-data:/app/data
    networks:
      - ai-research-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    restart: unless-stopped

  crawler:
    build:
      context: ./workers/crawler
      dockerfile: Dockerfile
    environment:
      - API_BASE_URL=http://backend:8000
      - API_KEY=${API_KEY:-dev-key-change-in-production}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-research-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - workers
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped

  fact-extractor:
    build:
      context: ./workers/fact_extractor
      dockerfile: Dockerfile
    environment:
      - API_BASE_URL=http://backend:8000
      - API_KEY=${API_KEY:-dev-key-change-in-production}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_MAX_RETRIES=3
      - QWEN_RATE_LIMIT_RPS=2.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-research-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - workers
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped

  insight-generator:
    build:
      context: ./workers/insight_generator
      dockerfile: Dockerfile
    environment:
      - API_BASE_URL=http://backend:8000
      - API_KEY=${API_KEY:-dev-key-change-in-production}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_MAX_RETRIES=3
      - QWEN_RATE_LIMIT_RPS=2.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-research-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - workers
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped

volumes:
  backend-data:
    driver: local

networks:
  ai-research-network:
    driver: bridge
    name: ai-research-network
